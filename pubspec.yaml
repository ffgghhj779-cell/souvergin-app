name: sovereign_maareg_app
description: Sovereign Maareg Fund – Premium Visa & Global Mobility Platform
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Backend
  supabase_flutter: ^2.8.4

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.6.2

  # Animations
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0

  # Images
  cached_network_image: ^3.4.1

  # Fonts
  google_fonts: ^6.2.1

  # URL Launcher (for email/contact)
  url_launcher: ^6.3.1

  # Display / Refresh Rate
  flutter_displaymode: ^0.6.0

  # Utils
  equatable: ^2.0.5
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  flutter_secure_storage: ^10.0.0
  shared_preferences: ^2.3.2
  connectivity_plus: ^7.1.1
  firebase_core: ^4.7.0
  firebase_crashlytics: ^5.2.0
  firebase_analytics: ^12.3.0
  firebase_performance: ^0.11.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7

flutter:
  uses-material-design: true
  assets:
    - assets/images/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  remove_alpha_ios: true
  image_path: "assets/images/mylogo.png"
  background_color: "#FFFFFF"
  min_sdk_android: 24

flutter_native_splash:
  color: "#050B14"
  android_12:
    color: "#050B14"
